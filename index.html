function sbFetch(method,key,value){
  var url=SB_URL+"/rest/v1/pfi_data?key=eq."+encodeURIComponent(key);
  if(method==="GET") url=SB_URL+"/rest/v1/pfi_data?key=eq."+encodeURIComponent(key)+"&select=value";
  var opts={method:method,headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal"}};
  if(method==="POST"||method==="PATCH") opts.body=JSON.stringify(method==="POST"?{key:key,value:value,updated_at:new Date().toISOString()}:{value:value,updated_at:new Date().toISOString()});
  return fetch(url,opts);
}
function sbGet(key){
  return fetch(SB_URL+"/rest/v1/pfi_data?key=eq."+encodeURIComponent(key)+"&select=value",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}})
    .then(function(r){return r.json();})
    .then(function(rows){return rows&&rows.length>0?rows[0].value:null;});
}
function sbSet(key,value){
  return sbFetch("POST",key,value).then(function(r){
    if(r.status===409||r.status===23505)return sbFetch("PATCH",key,value);
    return r;
  }).catch(function(){return sbFetch("PATCH",key,value);});
}

// ── CLOUD STORAGE HOOK ───────────────────────────────────────────
function useCloud(key,init){
  var ls=useState(function(){try{var s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch(e){return init;}});
  var v=ls[0],sv=ls[1];
  var loaded=useRef(false); // becomes true once we know the real cloud state
  var saveTimer=useRef(null);

  // Load from Supabase on mount — until this resolves, writes are blocked
  useEffect(function(){
    sbGet(key).then(function(remote){
      if(remote!==null){sv(remote);try{localStorage.setItem(key,JSON.stringify(remote));}catch(e){}}
      loaded.current=true;
    }).catch(function(){
      // Could not reach Supabase — do NOT mark loaded, so we never overwrite cloud with possibly-stale local state
      console.warn("Could not load "+key+" from cloud — using local cache, writes paused");
    });
  },[key]);

  // Debounced save to Supabase on change — SKIPPED until initial cloud load succeeded
  var setV=useCallback(function(updater){
    sv(function(prev){
      var next=typeof updater==="function"?updater(prev):updater;
      try{localStorage.setItem(key,JSON.stringify(next));}catch(e){}
      if(loaded.current){
        clearTimeout(saveTimer.current);
        saveTimer.current=setTimeout(function(){sbSet(key,next);},800);
      }
      return next;
    });
  },[key]);

  return[v,setV];
}

// Poll for remote changes every 30 seconds
function usePoll(key,sv){
  useEffect(function(){
    var interval=setInterval(function(){
      sbGet(key).then(function(remote){
        if(remote!==null){
          sv(function(current){
            var cStr=JSON.stringify(current),rStr=JSON.stringify(remote);
            if(cStr!==rStr){try{localStorage.setItem(key,rStr);}catch(e){}return remote;}
            return current;
          });
        }
      }).catch(function(){});
    },30000);
    return function(){clearInterval(interval);};
  },[key]);
}

// ── RECOVERY PANEL ───────────────────────────────────────────────
function RecoveryPanel(p){
  var s0=useState(null),found=s0[0],setFound=s0[1];

  var s2=useState(""),msg=s2[0],setMsg=s2[1];
  var s3=useState(false),restoring=s3[0],setRestoring=s3[1];

  function checkLocal(){
    var candidates=["pfi_items_v7","pfi_items_v6","pfi_items_v5"];
    var best=null,bestKey=null;
    candidates.forEach(function(k){
      try{
        var raw=localStorage.getItem(k);
        if(!raw)return;
        var v=JSON.parse(raw);
        if(Array.isArray(v)&&v.length>0&&(!best||v.length>best.length)){best=v;bestKey=k;}
      }catch(e){}
    });
    setFound(best?{key:bestKey,items:best}:null);
    setChecked(true);
  }

  function restore(){
    if(!found)return;
    setRestoring(true);
    sbSet("pfi_items_v7",found.items).then(function(){
      localStorage.setItem("pfi_items_v7",JSON.stringify(found.items));
      setMsg("✅ Restauré ! "+found.items.length+" éléments renvoyés vers le cloud.");
      setRestoring(false);
      setTimeout(function(){p.onDone();window.location.reload();},2000);
    }).catch(function(){
      setMsg("❌ Erreur de connexion au cloud. Réessaie dans un instant.");
      setRestoring(false);
    });
  }

  return h(Modal,{style:{maxWidth:440}},
    h("div",{style:{fontSize:16,fontWeight:700,marginBottom:10}},"🔎 Récupération de secours"),
    !checked&&h(Cl,{gap:10},
      h("div",{style:{fontSize:13,color:C.text,lineHeight:1.6}},
        "Cet outil va vérifier si ce navigateur (",h("strong",null,"sur cet appareil uniquement"),") a encore une copie de tes tâches enregistrée localement, avant qu'elles disparaissent du cloud."),

      h("div",{style:{background:C.sL,borderRadius:10,padding:12,fontSize:13,color:C.success}},
        "✅ Trouvé ! "+found.items.length+" tâches en cache local (clé: "+found.key+")."),

        }),
        found.items.length>15&&h("div",{style:{fontSize:11,color:C.muted,marginTop:4}},"... et "+(found.items.length-15)+" de plus")
      ),
      h("div",{style:{fontSize:12,color:C.muted}},"Cliquer ci-dessous renverra ces tâches vers le cloud et remplacera ce qui s'y trouve actuellement."),

        h(Btn,{variant:"ghost",onClick:p.onDone,style:{flex:1}},"Annuler")

// ── MIGRATION ─────────────────────────────────────────────────────
function MigrationBanner(p){

  var s1=useState(""),msg=s1[0],setMsg=s1[1];
  function migrate(){
    setMigrating(true);
    setMsg("Migration en cours...");
    var keys=["pfi_items_v5","pfi_items_v6","pfi_items_v7","pfi_handover_v5","pfi_handover_v6","pfi_procs_v6","pfi_pcats_v5","pfi_mfocus","pfi_mgoals","pfi_phg","pfi_chg","pfi_kpis","pfi_streak_v5","pfi_intention_v3","pfi_dump_cats"];
    var cloudKeys={"pfi_items_v5":"pfi_items_v7","pfi_items_v6":"pfi_items_v7","pfi_items_v7":"pfi_items_v7","pfi_handover_v5":"pfi_handover_v6","pfi_handover_v6":"pfi_handover_v6","pfi_procs_v6":"pfi_procs_v6","pfi_pcats_v5":"pfi_pcats_v5","pfi_mfocus":"pfi_mfocus","pfi_mgoals":"pfi_mgoals","pfi_phg":"pfi_phg","pfi_chg":"pfi_chg","pfi_kpis":"pfi_kpis","pfi_streak_v5":"pfi_streak_v5","pfi_intention_v3":"pfi_intention_v3","pfi_dump_cats":"pfi_dump_cats"};

      }catch(e){return Promise.resolve();}
    });
    Promise.all(promises).then(function(){
      localStorage.setItem("pfi_migrated_v1","true");
      setMsg("✅ Migration terminée ! "+pushed+" éléments synchronisés.");
      setTimeout(function(){p.onDone();},2000);
      setMigrating(false);

    ),
    !msg&&h(R,{gap:8,style:{marginTop:10}},
      h(Btn,{onClick:migrate,disabled:migrating,style:{background:C.gold}},"☁️ Migrer mes données vers le cloud"),
      h(Btn,{variant:"ghost",onClick:function(){localStorage.setItem("pfi_migrated_v1","true");p.onDone();},style:{fontSize:12}},"Ignorer")
    )

}
